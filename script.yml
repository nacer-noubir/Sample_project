#!/usr/bin/env bash
set -euo pipefail

#──────────────────────────────────────────────
# build-local.sh
# Parse variables.yml and run docker build
# Compatible: macOS (zsh/bash 3.x), Linux
#──────────────────────────────────────────────

SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]:-$0}")" && pwd)"
VARS_FILE="${SCRIPT_DIR}/variables.yml"
DOCKERFILE="${SCRIPT_DIR}/Dockerfile"

# ── Check required files ──
for f in "$VARS_FILE" "$DOCKERFILE"; do
  if [ ! -f "$f" ]; then
    echo "❌ Missing: $f"
    exit 1
  fi
done

# ── Parse variables.yml (simple key: value format) ──
echo "📄 Loading variables from $VARS_FILE"

BUILD_ARGS=""
_IMAGE_NAME=""
_IMAGE_TAG=""

while IFS= read -r line || [ -n "$line" ]; do
  # Skip comments and blank lines
  case "$line" in
    \#*|"") continue ;;
  esac

  # Match KEY: VALUE
  key=$(echo "$line" | sed -n 's/^[[:space:]]*\([A-Za-z_][A-Za-z0-9_]*\)[[:space:]]*:[[:space:]]*\(.*\)/\1/p')
  value=$(echo "$line" | sed -n 's/^[[:space:]]*\([A-Za-z_][A-Za-z0-9_]*\)[[:space:]]*:[[:space:]]*\(.*\)/\2/p')

  [ -z "$key" ] && continue

  # Strip surrounding quotes and trailing whitespace
  value=$(echo "$value" | sed "s/^['\"]//;s/['\"]$//;s/[[:space:]]*$//")

  export "$key"="$value"
  echo "   $key=$value"

  BUILD_ARGS="$BUILD_ARGS --build-arg ${key}=${value}"

  # Capture image name/tag if present
  [ "$key" = "IMAGE_NAME" ] && _IMAGE_NAME="$value"
  [ "$key" = "IMAGE_TAG" ]  && _IMAGE_TAG="$value"

done < "$VARS_FILE"

# ── Build image name / tag ──
IMAGE_NAME="${IMAGE_NAME:-${_IMAGE_NAME:-airflow-custom}}"
IMAGE_TAG="${IMAGE_TAG:-${_IMAGE_TAG:-latest}}"
FULL_IMAGE="${IMAGE_NAME}:${IMAGE_TAG}"

echo ""
echo "🐳 Building image: $FULL_IMAGE"
echo "   Context: $SCRIPT_DIR"
echo ""

# shellcheck disable=SC2086
docker build \
  $BUILD_ARGS \
  -t "$FULL_IMAGE" \
  -f "$DOCKERFILE" \
  "$SCRIPT_DIR"

echo ""
echo "✅ Image built: $FULL_IMAGE"
echo ""
echo "Verify:  docker images | grep $IMAGE_NAME"
echo "Run:     docker run --rm -it $FULL_IMAGE bash"
