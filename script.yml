#!/usr/bin/env bash
set -euo pipefail

#──────────────────────────────────────────────────────
# build-local.sh
# Parse GitLab CI variables.yml and run docker build
# Compatible: macOS (zsh/bash 3.x), Linux
#
# Usage:
#   ./build-local.sh                  # build
#   DRY_RUN=true ./build-local.sh     # preview only
#──────────────────────────────────────────────────────

SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]:-$0}")" && pwd)"
VARS_FILE="${SCRIPT_DIR}/variables.yml"
DOCKERFILE="${SCRIPT_DIR}/Dockerfile"
DRY_RUN="${DRY_RUN:-false}"

# ── Check required files ──
for f in "$VARS_FILE" "$DOCKERFILE"; do
  if [ ! -f "$f" ]; then
    echo "❌ Missing: $f"
    exit 1
  fi
done

# ── Temp files ──
ARGS_FILE=$(mktemp)
RESOLVED_VARS=$(mktemp)
trap 'rm -f "$ARGS_FILE" "$RESOLVED_VARS"' EXIT

echo "📄 Parsing variables from $VARS_FILE"
echo ""

# ── Pass 1: Extract key=value ──
while IFS= read -r line || [ -n "$line" ]; do
  trimmed=$(echo "$line" | sed 's/^[[:space:]]*//')

  case "$trimmed" in
    ""|\#*) continue ;;
  esac
  echo "$trimmed" | grep -qE '^[A-Za-z_][A-Za-z0-9_]*:[[:space:]]*$' && continue

  key=$(echo "$trimmed" | sed -n 's/^\([A-Za-z_][A-Za-z0-9_]*\)[[:space:]]*:[[:space:]]*\(.*\)/\1/p')
  value=$(echo "$trimmed" | sed -n 's/^\([A-Za-z_][A-Za-z0-9_]*\)[[:space:]]*:[[:space:]]*\(.*\)/\2/p')

  [ -z "$key" ] && continue

  value=$(echo "$value" | sed "s/^['\"]//;s/['\"]$//;s/[[:space:]]*$//")
  [ -z "$value" ] && continue

  echo "${key}=${value}" >> "$RESOLVED_VARS"

done < "$VARS_FILE"

# ── Pass 2: Resolve variable references ($VAR / ${VAR}) ──
resolve_vars() {
  local result="$1"
  while IFS='=' read -r k v; do
    [ -z "$k" ] && continue
    result=$(echo "$result" | sed "s|\${${k}}|${v}|g")
    result=$(echo "$result" | sed "s|\$${k}|${v}|g")
  done < "$RESOLVED_VARS"
  echo "$result"
}

for _pass in 1 2 3; do
  TEMP_RESOLVED=$(mktemp)
  while IFS='=' read -r key value; do
    [ -z "$key" ] && continue
    resolved=$(resolve_vars "$value")
    echo "${key}=${resolved}" >> "$TEMP_RESOLVED"
  done < "$RESOLVED_VARS"
  mv "$TEMP_RESOLVED" "$RESOLVED_VARS"
done

# ── Display and export ──
COUNT=0

while IFS='=' read -r key value; do
  [ -z "$key" ] && continue
  echo "   ✓ $key=$value"
  export "$key"="$value"
  echo "--build-arg" >> "$ARGS_FILE"
  printf '%s=%s\n' "$key" "$value" >> "$ARGS_FILE"
  COUNT=$((COUNT + 1))
done < "$RESOLVED_VARS"

echo ""
echo "   Loaded $COUNT variables"

# ── Build image name ──
DOCKER_IMAGE_TO_BUILD="${DOCKER_IMAGE_TO_BUILD:-airflow-custom}"
BASE_IMAGE_TAG="${BASE_IMAGE_TAG:-latest}"
FULL_IMAGE="${DOCKER_IMAGE_TO_BUILD}:${BASE_IMAGE_TAG}"

echo ""
echo "🐳 Building image: $FULL_IMAGE"
echo "   Context: $SCRIPT_DIR"
echo ""

if [ "$DRY_RUN" = "true" ]; then
  echo "🔍 DRY RUN — command that would be executed:"
  echo ""
  echo "docker build \\"
  while IFS= read -r arg; do
    echo "  $arg \\"
  done < "$ARGS_FILE"
  echo "  -t $FULL_IMAGE \\"
  echo "  -f $DOCKERFILE \\"
  echo "  $SCRIPT_DIR"
  exit 0
fi

xargs docker build \
  -t "$FULL_IMAGE" \
  -f "$DOCKERFILE" \
  "$SCRIPT_DIR" < "$ARGS_FILE"

echo ""
echo "✅ Image built: $FULL_IMAGE"
echo ""
echo "Verify:  docker images | grep ${DOCKER_IMAGE_TO_BUILD}"
echo "Run:     docker run --rm -it ${FULL_IMAGE} bash"
