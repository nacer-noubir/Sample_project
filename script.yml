# ──────────────────────────────────────────────
# Makefile — Local Airflow image build
# Usage:
#   make build                    # build l'image
#   make dry-run                  # affiche la commande sans exécuter
#   make shell                    # lance un shell dans l'image
#   make clean                    # supprime l'image locale
#
# Secrets:
#   echo "mon-mdp" > .artifactory_password
#   make build
# ──────────────────────────────────────────────

SHELL := /bin/bash

# ── Parse variables.yml ──
define parse_var
$(shell grep -E '^\s*$(1)\s*:' variables.yml | head -1 | sed "s/^[[:space:]]*$(1)[[:space:]]*:[[:space:]]*//;s/^['\"]//;s/['\"]$$//;s/[[:space:]]*$$//")
endef

# ── Variables depuis variables.yml ──
AIRFLOW_VERSION   := $(call parse_var,AIRFLOW_VERSION)
PYTHON_VERSION    := $(call parse_var,PYTHON_VERSION)
BASE_IMAGE_TAG    := $(AIRFLOW_VERSION)-python$(PYTHON_VERSION)
IMAGE_AUID        := $(call parse_var,IMAGE_AUID)
IMAGE_CATEGORY    := $(call parse_var,IMAGE_CATEGORY)
IMAGE_DESCRIPTION := $(call parse_var,IMAGE_DESCRIPTION)
IMAGE_VENDOR      := $(call parse_var,IMAGE_VENDOR)
IMAGE_SOURCE      := $(call parse_var,IMAGE_SOURCE)
IMAGE_BASE_NAME   := $(call parse_var,IMAGE_BASE_NAME)
DOCKER_IMAGE      := $(call parse_var,DOCKER_IMAGE_TO_BUILD)
ARTIFACTORY_REG   := $(call parse_var,ARTIFACTORY_DOCKER_REGISTRY)

# ── Valeurs par défaut / override ──
DOCKER_IMAGE  ?= airflow-custom
TAG           ?= $(BASE_IMAGE_TAG)
FULL_IMAGE    := $(DOCKER_IMAGE):$(TAG)
IMAGE_CREATED := $(shell date -u +'%F %TZ')

# ── Secret Artifactory ──
SECRET_FILE   := .artifactory_password
SECRET_ARG    :=
ifneq (,$(wildcard $(SECRET_FILE)))
  SECRET_ARG := --secret id=artifactory_pwd,src=$(SECRET_FILE)
endif

.PHONY: build dry-run shell clean vars help

build: check-vars ## Build l'image Docker
	@echo ""
	@echo "🐳 Building $(FULL_IMAGE)"
	@echo ""
	docker build \
	  -f Dockerfile \
	  --network host \
	  --build-arg "AIRFLOW_VERSION=$(AIRFLOW_VERSION)" \
	  --build-arg "PYTHON_VERSION=$(PYTHON_VERSION)" \
	  --build-arg "BASE_IMAGE_TAG=$(BASE_IMAGE_TAG)" \
	  --build-arg "IMAGE_AUID=$(IMAGE_AUID)" \
	  --build-arg "IMAGE_CATEGORY=$(IMAGE_CATEGORY)" \
	  --build-arg "IMAGE_CREATED=$(IMAGE_CREATED)" \
	  --build-arg "IMAGE_DESCRIPTION=$(IMAGE_DESCRIPTION)" \
	  --build-arg "IMAGE_SOURCE=$(IMAGE_SOURCE)" \
	  --build-arg "IMAGE_VENDOR=$(IMAGE_VENDOR)" \
	  --build-arg "IMAGE_BASE_NAME=$(IMAGE_BASE_NAME)" \
	  $(SECRET_ARG) \
	  --tag "$(FULL_IMAGE)" \
	  .
	@echo ""
	@echo "✅ $(FULL_IMAGE) built"

dry-run: check-vars ## Affiche la commande sans exécuter
	@echo ""
	@echo "🔍 DRY RUN:"
	@echo ""
	@echo 'docker build -f Dockerfile --network host \'
	@echo '  --build-arg "AIRFLOW_VERSION=$(AIRFLOW_VERSION)" \'
	@echo '  --build-arg "PYTHON_VERSION=$(PYTHON_VERSION)" \'
	@echo '  --build-arg "BASE_IMAGE_TAG=$(BASE_IMAGE_TAG)" \'
	@echo '  --build-arg "IMAGE_AUID=$(IMAGE_AUID)" \'
	@echo '  --build-arg "IMAGE_CATEGORY=$(IMAGE_CATEGORY)" \'
	@echo '  --build-arg "IMAGE_CREATED=$(IMAGE_CREATED)" \'
	@echo '  --build-arg "IMAGE_DESCRIPTION=$(IMAGE_DESCRIPTION)" \'
	@echo '  --build-arg "IMAGE_SOURCE=$(IMAGE_SOURCE)" \'
	@echo '  --build-arg "IMAGE_VENDOR=$(IMAGE_VENDOR)" \'
	@echo '  --build-arg "IMAGE_BASE_NAME=$(IMAGE_BASE_NAME)" \'
	@echo '  $(SECRET_ARG) \'
	@echo '  --tag "$(FULL_IMAGE)" .'

shell: ## Lance un shell dans l'image
	docker run --rm -it $(FULL_IMAGE) bash

vars: ## Affiche les variables parsées
	@echo "AIRFLOW_VERSION   = $(AIRFLOW_VERSION)"
	@echo "PYTHON_VERSION    = $(PYTHON_VERSION)"
	@echo "BASE_IMAGE_TAG    = $(BASE_IMAGE_TAG)"
	@echo "IMAGE_AUID        = $(IMAGE_AUID)"
	@echo "IMAGE_CATEGORY    = $(IMAGE_CATEGORY)"
	@echo "IMAGE_DESCRIPTION = $(IMAGE_DESCRIPTION)"
	@echo "IMAGE_VENDOR      = $(IMAGE_VENDOR)"
	@echo "IMAGE_SOURCE      = $(IMAGE_SOURCE)"
	@echo "IMAGE_BASE_NAME   = $(IMAGE_BASE_NAME)"
	@echo "DOCKER_IMAGE      = $(DOCKER_IMAGE)"
	@echo "TAG               = $(TAG)"
	@echo "FULL_IMAGE        = $(FULL_IMAGE)"
	@echo ""
	@if [ -f "$(SECRET_FILE)" ]; then echo "🔒 Secret: $(SECRET_FILE) found"; else echo "⚠️  No secret file ($(SECRET_FILE))"; fi

clean: ## Supprime l'image locale
	docker rmi $(FULL_IMAGE) 2>/dev/null || true
	@echo "🧹 $(FULL_IMAGE) removed"

check-vars:
	@if [ -z "$(AIRFLOW_VERSION)" ]; then echo "❌ variables.yml not found or AIRFLOW_VERSION missing"; exit 1; fi

help: ## Affiche cette aide
	@grep -E '^[a-zA-Z_-]+:.*## ' $(MAKEFILE_LIST) | awk 'BEGIN {FS = ":.*## "}; {printf "  make %-12s %s\n", $$1, $$2}'